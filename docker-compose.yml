services:
  db:
    image: postgres:16-alpine
    container_name: swayamvani-db
    environment:
      POSTGRES_DB: swayamvani
      POSTGRES_USER: swayamvani
      POSTGRES_PASSWORD: swayamvani
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swayamvani -d swayamvani"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    container_name: swayamvani-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123
      DB_VENDOR: postgres
      DB_DSN: postgres://swayamvani:swayamvani@db:5432/swayamvani?sslmode=disable
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: swayamvani-pgadmin
    platform: linux/amd64
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  pgdata:
  pgadmin-data:

services:
  db:
    image: mysql:8.0
    container_name: swayamvani-mysql
    environment:
      MYSQL_ROOT_PASSWORD: swayamvani
      MYSQL_DATABASE: swayamvani
      MYSQL_USER: swayamvani
      MYSQL_PASSWORD: swayamvani
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uswayamvani -pswayamvani --silent"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: swayamvani-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      ADMIN_USER: admin
      ADMIN_PASSWORD: admin123
      DB_VENDOR: mysql
      DB_DSN: swayamvani:swayamvani@tcp(db:3306)/swayamvani?parseTime=true
      CUSTOMER_SESSION_SECRET: "changeme-session-secret"
      RAZORPAY_KEY_ID: ""
      RAZORPAY_KEY_SECRET: ""
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mysqldata:

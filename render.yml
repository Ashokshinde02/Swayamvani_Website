services:
  - type: web_service
    name: swayamvani-web
    env: go
    region: iad
    plan: starter
    buildCommand: go build -o swayamvani main.go
    startCommand: |
      if [ -z "$DB_DSN" ] && [ -n "$DATABASE_URL" ]; then
        DB_DSN=$(python - <<'PY'
import os
import sys
import urllib.parse

url = os.getenv("DATABASE_URL", "")
if not url.startswith("mysql://"):
    sys.exit(0)

parsed = urllib.parse.urlparse(url)
user = parsed.username or ""
password = parsed.password or ""
host = parsed.hostname or "localhost"
port = parsed.port or 3306
database = parsed.path.lstrip("/")
params = "parseTime=true&loc=Local"
print(f"{user}:{password}@tcp({host}:{port})/{database}?{params}")
PY
        )
      fi
      ./swayamvani
    envVars:
      - key: DB_VENDOR
        value: mysql
      - key: DATABASE_URL
        fromDatabase:
          name: swayamvani-mysql
          property: CONNECTION_URL
      - key: CUSTOMER_SESSION_SECRET
        generator: secret
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: change-me

databases:
  - name: swayamvani-mysql
    engine: mysql
    version: "8"
    plan: starter
